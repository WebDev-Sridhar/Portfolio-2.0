    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is your typical project timeline?",
          "acceptedAnswer": { "@type": "Answer", "text": "It depends on scope. A portfolio takes 1–2 weeks. A full web app typically takes 4–8 weeks. I always give you a clear timeline estimate before we start." }
        },
        {
          "@type": "Question",
          "name": "How do I get in touch to discuss a project?",
          "acceptedAnswer": { "@type": "Answer", "text": "You can reach me via the contact form on this site, or directly by email or WhatsApp. I typically respond within 24 hours." }
        },
        {
          "@type": "Question",
          "name": "What do you need from me to get started?",
          "acceptedAnswer": { "@type": "Answer", "text": "A brief about your project goals, any design references you like, your content (text, images), and a rough deadline if you have one." }
        },
        {
          "@type": "Question",
          "name": "Will I be able to update the site myself?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. I build a custom admin panel so you can edit text, images, and content without touching code." }
        },
        {
          "@type": "Question",
          "name": "Do you offer revisions?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes — two rounds of revisions are included in every project. Additional revision rounds are billed at an hourly rate." }
        },
        {
          "@type": "Question",
          "name": "What is your payment structure?",
          "acceptedAnswer": { "@type": "Answer", "text": "50% upfront to begin, 50% on delivery. For larger projects I can split into milestone-based payments." }
        },
        {
          "@type": "Question",
          "name": "Do you provide hosting?",
          "acceptedAnswer": { "@type": "Answer", "text": "I can set up and deploy to Firebase Hosting, Vercel, or Netlify. Ongoing hosting fees are separate from my development fee." }
        },
        {
          "@type": "Question",
          "name": "Can you redesign an existing website?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Redesigns are some of my favourite projects. I'll audit what you have and build on what works while fixing what doesn't." }
        }
      ]
    }
    </script>
